apiVersion: v1
kind: Namespace
metadata:
  name: spf-app-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spf-client-dep
  namespace: spf-app-ns
spec:
  replicas: 10
  selector:
    matchLabels:
      app: spf-client
  template:
    metadata:
      labels:
        app: spf-client
    spec:
      containers:
        - name: spf-client
          image: rishicse24/spf-client:v_0.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: spf-client-svc
  namespace: spf-app-ns
spec:
  type: LoadBalancer
  loadBalancerIP: 10.120.59.70
  selector:
    app: spf-client
  ports:
    - name: http
      protocol: TCP
      port: 9001
      targetPort: 9001